<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator wydatków</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background-glow glow-1"></div>
  <div class="background-glow glow-2"></div>

  <main class="app-shell">
    <section class="card">
      <div class="header">
        <p class="eyebrow">Personal Finance</p>
        <h1>Kalkulator wydatków</h1>
        <p class="subtitle">Dodawaj i przeglądaj swoje wydatki dla wybranego dnia.</p>
      </div>

      <div class="date-section">
        <label for="expenseDate">Data</label>
        <input id="expenseDate" type="date">
      </div>

      <div class="form-section">
        <div class="input-group">
          <label for="name">Nazwa wydatku</label>
          <input id="name" placeholder="Np. Zakupy, paliwo, obiad">
        </div>

        <div class="input-group">
          <label for="amount">Kwota</label>
          <input id="amount" placeholder="Np. 49.99" type="number" step="0.01">
        </div>

        <button class="add-btn" onclick="add()">Dodaj wydatek</button>
      </div>

      <div class="summary-box">
        <span class="summary-label">Suma wydatków</span>
        <span class="summary-value"><span id="sum">0.00</span> zł</span>
      </div>

      <div class="month-summary">
        <span>Podsumowanie miesiąca</span>
        <span><span id="monthSum">0.00</span> zł</span>
      </div>

      <div class="list-section">
        <div class="list-header">
          <h2>Lista wydatków</h2>
        </div>

        <ul id="list" class="expense-list"></ul>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
